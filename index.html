<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <title>Frontend Mentor | Product preview card component</title>

  </style>
</head>

<body>

  <div class="container">
    <div class="image"><img src="./images/image-product-desktop.jpg" alt=""></div>
    <div class="texts">
      <span class="perfume">P E R F U M E</span>
      <p class="Gabrielle">Gabrielle <br> Essence Eau <br> De Parfum</p>
      <p class="floral">A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>
      <div class="price-container">
        <span class="price">$149.99</span>
        <span class="onesixnine">$169.99</span> <br>
      </div>
      <button><img class="icon" src="./images/icon-cart.svg" alt="cart">Add to Cart</button>
    </div>
  </div>

</body>

</html>
